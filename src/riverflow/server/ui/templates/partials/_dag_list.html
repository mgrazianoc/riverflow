{# Partial: sidebar DAG list — loaded by HTMX #}
{% for dag in dags %}
<li class="dag-list-item {% if dag.is_running %}dag-running{% endif %}"
    data-dag-id="{{ dag.dag_id }}">
  <a href="/ui/dags/{{ dag.dag_id }}"
     class="dag-link"
     hx-get="/ui/dags/{{ dag.dag_id }}"
     hx-target="#main-content"
     hx-select="#main-content > *"
     hx-push-url="true"
     onclick="document.querySelectorAll('.dag-list-item').forEach(i=>i.classList.remove('active'));this.closest('.dag-list-item').classList.add('active')">
    <span class="dag-id">{{ dag.dag_id }}</span>
    <span class="dag-badge state-{{ 'running' if dag.is_running else 'idle' }}">
      {{ 'running' if dag.is_running else 'idle' }}
    </span>
  </a>
  <div class="dag-mini-stats">
    <span title="Success rate">{{ "%.0f"|format(dag.success_rate) }}%</span>
    <span title="Total runs">{{ dag.total_runs }} runs</span>
  </div>
</li>
{% else %}
<li class="dag-list-empty">No DAGs registered</li>
{% endfor %}
