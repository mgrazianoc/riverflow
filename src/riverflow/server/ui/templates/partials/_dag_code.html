{# Partial: DAG code view — shows the Python source of each task #}
<div class="code-view">
  {% if tasks_source %}
  {% for item in tasks_source %}
  <div class="code-block">
    <div class="code-block-header">
      <span class="code-block-title">{{ item.task_id }}</span>
      <span class="code-block-meta">{{ item.module }}</span>
    </div>
    <pre class="code-pre"><code>{{ item.source }}</code></pre>
  </div>
  {% endfor %}
  {% else %}
  <p class="empty-state-small">Source code not available for this DAG's tasks.</p>
  {% endif %}
</div>
