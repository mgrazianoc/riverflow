{# Partial: DAG graph — server-positioned nodes, SVG edges drawn by JS #}
<div class="graph-container graph-laid-out"
     data-dag-id="{{ graph.dag_id }}"
     data-graph-width="{{ graph.graph_width }}"
     data-graph-height="{{ graph.graph_height }}"
     style="min-width: {{ graph.graph_width }}px; min-height: {{ graph.graph_height }}px;">
  {% for node in graph.nodes %}
  <div class="graph-node state-{{ node.state.value }}"
       data-task-id="{{ node.id }}"
       style="left: {{ node.x }}px; top: {{ node.y }}px; width: {{ node.width }}px;">
    <span class="node-label">{{ node.label }}</span>
    <span class="node-state">{{ node.state.value }}</span>
    <div class="node-actions">
      <button class="node-btn" title="Trigger {{ node.id }}"
              hx-put="/api/dags/{{ graph.dag_id }}/tasks/{{ node.id }}/trigger"
              hx-swap="none">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="1,0 9,5 1,10" fill="currentColor"/></svg>
      </button>
      <button class="node-btn" title="View logs for {{ node.id }}"
              onclick="openLogPanel('/ui/partials/task-logs/{{ graph.run_id }}?task_id={{ node.id }}')"
              {% if not graph.run_id %}disabled{% endif %}>
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="0" width="8" height="2" rx="0.5" fill="currentColor"/><rect x="1" y="4" width="8" height="2" rx="0.5" fill="currentColor"/><rect x="1" y="8" width="5" height="2" rx="0.5" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
  {% endfor %}

  {# Edge data for JS SVG rendering #}
  <script type="application/json" id="graph-edges">
    [{% for edge in graph.edges %}{"source":"{{ edge.source }}","target":"{{ edge.target }}"}{% if not loop.last %},{% endif %}{% endfor %}]
  </script>
</div>
