{% extends "base.html" %}

<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center;">
  <div style="font-size: 4rem; font-weight: 700; color: var(--muted); line-height: 1;">404</div>
  <p style="margin-top: 12px; color: var(--muted); font-size: 1rem;">The page you're looking for doesn't exist.</p>

</div>
{% endblock %}
