{# Partial: Dashboard summary stat cards #}
<div class="dash-card">
  <span class="dash-card-label">Total DAGs</span>
  <span class="dash-card-value">{{ dashboard.total_dags }}</span>
</div>
<div class="dash-card">
  <span class="dash-card-label">Running Now</span>
  <span class="dash-card-value" style="color: var(--run)">{{ dashboard.running_now }}</span>
</div>
<div class="dash-card">
  <span class="dash-card-label">Total Runs</span>
  <span class="dash-card-value">{{ dashboard.total_runs }}</span>
</div>
<div class="dash-card">
  <span class="dash-card-label">Recent Failures</span>
  <span class="dash-card-value" style="color: var(--fail)">{{ dashboard.recent_failures }}</span>
</div>
<div class="dash-card">
  <span class="dash-card-label">Success Rate</span>
  <span class="dash-card-value" style="color: var(--ok)">{{ "%.1f"|format(dashboard.overall_success_rate) }}%</span>
</div>
